<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar -->
        <div class="left-sidebar">
            <!-- Tab Navigation Buttons -->
            <div class="sidebar-nav" role="tablist" aria-label="Bookmark navigation">
                <button id="bookmarks-tab" class="sidebar-nav-button active" role="tab" aria-selected="true" aria-controls="bookmarks-content" title="Bookmarks">
                    <i class="far fa-bookmark" aria-hidden="true"></i>
                    <span class="nav-label">BM</span>
                </button>
                <button id="working-bookmark-tab" class="sidebar-nav-button" role="tab" aria-selected="false" aria-controls="working-bookmark-content" title="Working links">
                    <i class="fas fa-link" aria-hidden="true"></i>
                    <span class="nav-label">WK</span>
                </button>
            </div>

            <!-- Control Buttons -->
            <div class="sidebar-controls">
                <button id="restore-default" class="sidebar-control-button" title="Restore defaults" aria-label="Restore default bookmarks and clear all data">
                    <i class="fas fa-undo" aria-hidden="true"></i>
                </button>
                <button id="export-bookmarks" class="sidebar-control-button" title="Export data" aria-label="Export all bookmarks, notes and tasks">
                    <i class="fas fa-file-export" aria-hidden="true"></i>
                    <span class="nav-label">E</span>
                </button>
                <button id="import-bookmarks" class="sidebar-control-button" title="Import data" aria-label="Import bookmarks, notes and tasks from a file">
                    <i class="fas fa-file-import" aria-hidden="true"></i>
                    <span class="nav-label">I</span>
                </button>
                <button id="sync-bookmarks" class="sidebar-control-button" title="Sync to cloud" aria-label="Sync data to cloud">
                    <i class="fas fa-cloud-upload-alt" aria-hidden="true"></i>
                    <span class="nav-label">Up</span>
                </button>
                <button id="load-from-cloud" class="sidebar-control-button" title="Load from cloud" aria-label="Load data from cloud and overwrite local storage">
                    <i class="fas fa-cloud-download-alt" aria-hidden="true"></i>
                    <span class="nav-label">Load</span>
                </button>
                <input type="file" id="import-file" accept=".json" style="display: none;">
            </div>
        </div>

        <div class="container">
            <div class="bookmarks-container">
                    <div id="bookmarks-content" class="bookmark-tab-content active" role="tabpanel" aria-labelledby="bookmarks-tab">
                        <!-- Bookmarks Header with View Toggle -->
                        <div class="bookmarks-header">
                            <div class="view-toggle" role="group" aria-label="View mode toggle">
                                <button id="grid-view" class="control-button view-button active" aria-label="Switch to grid view" aria-pressed="true">
                                    <i class="fas fa-th" aria-hidden="true"></i> Grid
                                </button>
                                <button id="row-view" class="control-button view-button" aria-label="Switch to row view" aria-pressed="false">
                                    <i class="fas fa-list" aria-hidden="true"></i> Row
                                </button>
                            </div>
                            <button id="toggle-form" class="control-button add-button" aria-label="Add new bookmark">
                                <i class="fas fa-plus" aria-hidden="true"></i> New
                            </button>
                        </div>

                        <div id="bookmarks-list" role="grid" aria-label="Bookmarks collection"></div>
                    </div>
                    <div id="working-bookmark-content" class="bookmark-tab-content" role="tabpanel" aria-labelledby="working-bookmark-tab">
                        <div class="working-input-container">
                            <input type="url" id="working-bookmark-input" placeholder="Paste your working link here..." aria-label="New working link input">
                            <button id="working-view-toggle" class="control-button view-button" aria-label="Toggle view mode">
                                <i class="fas fa-list" aria-hidden="true"></i> List View
                            </button>
                        </div>
                        <div id="working-bookmark-list" role="list" aria-label="Working links list"></div>
                    </div>
                </div>
        </div>

        <div class="notes-container">
            <div class="tabs-container">
                <div class="tab-buttons" role="tablist" aria-label="Main navigation">
                    <button id="notes-tab" class="tab-button active" role="tab" aria-selected="true" aria-controls="notes-content"><i class="fas fa-sticky-note" aria-hidden="true"></i> Notes</button>
                    <button id="commands-tab" class="tab-button" role="tab" aria-selected="false" aria-controls="commands-content"><i class="fas fa-terminal" aria-hidden="true"></i> Cmds</button>
                    <button id="guides-tab" class="tab-button" role="tab" aria-selected="false" aria-controls="guides-content"><i class="fas fa-book" aria-hidden="true"></i> Guides</button>
                    <button id="sticky-tab" class="tab-button" role="tab" aria-selected="false" aria-controls="sticky-content"><i class="fas fa-note-sticky" aria-hidden="true"></i> Sticky</button>
                    <button id="tasks-tab" class="tab-button" role="tab" aria-selected="false" aria-controls="tasks-content"><i class="fas fa-tasks" aria-hidden="true"></i> Tasks</button>
                </div>
                <div id="notes-content" class="tab-content active" role="tabpanel" aria-labelledby="notes-tab">
                    <div id="notes-list"></div>
                </div>
                <div id="commands-content" class="tab-content" role="tabpanel" aria-labelledby="commands-tab">
                    <div class="command-input-container">
                        <input type="text" id="commands-input" placeholder="Add a new command..." aria-label="New command input">
                    </div>
                    <div id="commands-list" role="list" aria-label="Commands list"></div>
                </div>
                <div id="guides-content" class="tab-content" role="tabpanel" aria-labelledby="guides-tab">
                    <div id="guides-list-view" class="guides-view">
                        <div class="guides-input-container">
                            <input type="text" id="guides-input" placeholder="Add a new guide..." aria-label="New guide input">
                        </div>
                        <div id="guides-list" role="list" aria-label="Guides list"></div>
                    </div>
                    <div id="guides-content-view" class="guides-view" style="display: none;">
                        <div class="guides-navigation">
                            <button id="guides-back-btn" class="guide-nav-btn" title="Back to guides list">
                                <i class="fas fa-arrow-left"></i> Back to Guides
                            </button>
                            <div class="guides-nav-info">
                                <button id="guides-prev-btn" class="guide-nav-btn guide-nav-arrow" title="Previous guide">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <span id="current-guide-title">Guide Title</span>
                                <button id="guides-next-btn" class="guide-nav-btn guide-nav-arrow" title="Next guide">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>
                        <div id="guides-content-container"></div>
                    </div>
                </div>
                <div id="sticky-content" class="tab-content" role="tabpanel" aria-labelledby="sticky-tab">
                    <div class="sticky-input-container">
                        <div class="sticky-title-row">
                            <input type="text" id="sticky-title-input" placeholder="Note title (optional)..." aria-label="Sticky note title input">
                            <label class="sticky-visibility-label">
                                <input type="checkbox" id="sticky-visibility-checkbox" aria-label="Show content visibility">
                                Show content
                            </label>
                        </div>
                        <input type="text" id="sticky-input" placeholder="Note content..." aria-label="New sticky note input">
                    </div>
                    <div id="sticky-list" role="list" aria-label="Sticky notes list"></div>
                </div>
                <div id="tasks-content" class="tab-content" role="tabpanel" aria-labelledby="tasks-tab">
                    <div class="task-input-container">
                        <input type="text" id="task-input" placeholder="Add a new task..." aria-label="New task input">
                    </div>
                    <div id="tasks-list" role="list" aria-label="Task list"></div>
                </div>

            </div>
        </div>

        <div class="add-bookmark-container" id="add-form" role="dialog" aria-labelledby="add-form-title" aria-modal="true">
            <form id="bookmark-form">
                <h2 id="add-form-title" class="visually-hidden">Add New Bookmark</h2>
                <div class="input-group">
                    <input type="text" id="bookmark-name" placeholder="Website Name" required aria-label="Website name">
                    <input type="url" id="bookmark-url" placeholder="Website URL" required aria-label="Website URL">
                    <input type="text" id="bookmark-category" placeholder="Category (e.g., personal, work, doc)" aria-label="Bookmark category">

                </div>
                <div class="form-buttons">
                    <button type="button" id="cancel-add" class="cancel-button" aria-label="Cancel adding bookmark">
                        <i class="fas fa-times" aria-hidden="true"></i> Cancel
                    </button>
                    <button type="submit" id="add-bookmark" aria-label="Add bookmark">
                        <i class="fas fa-plus" aria-hidden="true"></i> Add
                    </button>
                </div>
            </form>
        </div>

    </div>
    <script src="commands.js"></script>


    <script src="utils.js"></script>
    <script src="ui.js"></script>
    <script src="api-helper.js"></script>
    <script src="bookmark.js"></script>
    <script src="note.js"></script>
    <script src="guides.js"></script>
    <script src="task.js"></script>
    <script src="sticky.js"></script>
    <script src="working.js"></script>
    <script>
        // Initialize all modules when DOM is loaded
        document.addEventListener('DOMContentLoaded', async () => {
            window.UI.initializeUI();

            // Initialize all modules from local storage only
            window.Bookmarks.initializeBookmarks();
            window.Notes.initializeNote();
            window.Commands && window.Commands.initializeCommands();
            window.Guides.initializeGuides();
            window.Tasks.initializeTasks();
            window.Sticky.initializeSticky();
            window.Working.initializeWorking();
        });
    </script>
</body>
</html>
